<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles/normalize.css">

    <script src="scripts/chamber.js" defer></script>

<body>
    <header>
        <div class="branding">
            <img src="images/chandleraz.png" alt="Chandler Logo" width="100">
            <span>Chandler Chamber of Commerce</span>
        </div>

        <button id="ham-btn" class="hamburger" aria-label="Open navigation menu"></button>

        <nav id="nav-bar" class="navigation">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Directory</a></li>
                <li><a href="#">Join</a></li>
                <li><a href="#">Discover</a></li>
            </ul>
        </nav>
    </header>

    <img src="images/chandler7-small.jpg" alt="Site Hero Image" class="hero">


    <main>
        <h1>Home</h1>
        <div class="grid">
            <section class="events">
                <h2>Events</h2>
                <span>Events to be included </span>
            </section>
            <section class="current-weather">
                <h2>Current Weather</h2>
                <p><strong>Temperature:</strong> <span id="temp"></span></p>
                <p><strong>Conditions:</strong> <span id="conditions"></span></p>
                <p><strong>Wind:</strong> <span id="wind"></span></p>
                <img id="weather-icon" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="Weather Icon">
            </section>

            <section class="weather-forecast">
                <h2>Weather Forecast</h2>
                <div id="forecast-cards"></div>
            </section>
        </div>
        <div class="gallery-grid"></div>
    </main>
    <footer>
        <div class="social">
            <a href="https://www.facebook.com/jesse.hamilton.142" target="_blank"><img src="images/facebook.svg"
                    alt="Facebook logo" width="16" height="16"></a>

                    src="images/linkedin.svg" alt="LinkedIn logo" width="16" height="16"></a>
            <a href="https://x.com/hammingup" target="_blank"><img src="images/twitter-alt-square.svg"
                    alt="Twitter-x logo" width="16" height="16"></a>
            <a href="https://github.com/engineer1830" target="_blank"><img src="images/github.svg" alt="Github logo"
                    width="16" height="16"></a>
